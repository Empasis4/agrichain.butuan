[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.build]
cmds = [
  "...",
  "cd frontend && npm install --legacy-peer-deps && npm run build",
  "cp -r frontend/dist/* public/"
]

[start]
cmd = "touch database/database.sqlite; php artisan migrate --force; php artisan db:seed --force || true; php artisan serve --host=0.0.0.0 --port=$PORT"
